[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "flask db-init"
startCommand = "gunicorn 'app:create_app()' --bind 0.0.0.0:${PORT:-8000} --workers 2 --access-logfile - --error-logfile -"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[mounts]]
source = "portal-data"
destination = "/data"

[env]
DATABASE_PATH = "/data/portal.db"
