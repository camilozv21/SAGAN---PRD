[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "flask db-init"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[mounts]]
source = "portal-data"
destination = "/data"

[env]
DATABASE_PATH = "/data/portal.db"
