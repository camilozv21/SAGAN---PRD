<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AW Client Report Portal{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="/" class="brand">AW Client Report Portal</a>
            <nav class="main-nav">
                {% block nav %}
                <a href="/">Clients</a>
                {% endblock %}
            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <small>&copy; AW &mdash; Internal Portal</small>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
